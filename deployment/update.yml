---
- name: Update Medoru API Application
  hosts: medoru
  become: yes

  tasks:
    - name: Ensure app directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"
      loop:
        - "{{ app_home }}"
        - "{{ app_home }}/source"

    - name: Pull latest source code
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        dest: "{{ app_home }}/source"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ app_user }}"

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv .venv
        chdir: "{{ app_home }}/source"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies
      ansible.builtin.shell: |
        . .venv/bin/activate
        pip install --upgrade pip
        pip install .
      args:
        executable: /bin/bash
        chdir: "{{ app_home }}/source"
      become_user: "{{ app_user }}"

    - name: Check if current release exists
      ansible.builtin.stat:
        path: "{{ app_home }}/current"
      register: current_release_stat

    - name: Backup current release
      ansible.builtin.command:
        cmd: "cp -r {{ app_home }}/current {{ app_home }}/current.backup.{{ ansible_date_time.epoch }}"
      when: current_release_stat.stat.exists
      ignore_errors: yes

    - name: Stop medoru_api service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: stopped
      ignore_errors: yes

    - name: Deploy source to current
      ansible.builtin.shell: |
        rm -rf {{ app_home }}/current
        cp -r {{ app_home }}/source {{ app_home }}/current
        chown -R {{ app_user }}:{{ app_group }} {{ app_home }}/current
        chmod -R 755 {{ app_home }}/current
      args:
        executable: /bin/bash

    - name: Install systemd service
      ansible.builtin.template:
        src: templates/medoru_api.service.j2
        dest: /etc/systemd/system/{{ service_name }}.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Start medoru_api service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: started
        enabled: yes

    - name: Wait for API to be ready
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/api/v1/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 15
      delay: 3

    - name: Display deployment status
      ansible.builtin.debug:
        msg:
          - "=== medoru_api Update Complete ==="
          - "API URL: https://api.medoru.net"
          - "Health check: PASSED"
          - "Logs: sudo journalctl -u {{ service_name }} -f"
